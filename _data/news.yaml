- title: "**KDC** (Sensor data delivery through knowledge-driven communication using MLLM) is accepted by **NSDI 2026**! Congratulations to [Xingyu](https://xingyuchen.me/)!"
  date: 2025-12-10
  description: Knowledge-Driven Communication is a framework that transmits semantic knowledge rather than raw bits by leveraging pretrained knowledge bases with Vision-Language Models.

- title: "**EarCardio** (cardiac monitoring using commercial TWS earbuds) is accepted by **MobiCom 2026**! Congratulations to [Yongjian](https://fuyongjian.github.io/)!"
  date: 2025-12-02
  description: EarCardio repurposes the IMU sensors in TWS earbuds for cardiac monitoring by capturing in-ear ballistocardiogram (BCG) signals.
  url: https://www.youtube.com/watch?v=FrSbxhM5yII

- title: "**MagicPatch** (attack on mmWave security screening systems) is accepted by **MobiCom 2026**! Congratulations to Shuning!"
  date: 2025-12-02
  description: MagicPatch proposes an efficient attack on millimeterwave (mmWave) security screening systems by designing a novel reflective metasurface patch that can be easily attached to clothing.
  url: https://www.youtube.com/watch?v=Vgy-u9HlQOo

- title: "**UWB-Prac** is accepted by **SenSys 2026**! Congratulations to [Kailai](https://ambient-intelligence-lab-umich-eecs.github.io/ami_lab_website/members/Kailai-Cui.html)!"
  date: 2025-11-01
  description: UWB-Prac is a real-time seat-level smartphone localization system that operates using only the existing single UWB anchor infrastructure commonly found in modern vehicles.

