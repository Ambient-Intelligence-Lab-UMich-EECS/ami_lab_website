- title: Samsung START Project supports our lab's research on multi-modal lifelong memory augmentation systems.
  date: 2025-08-01
  description: Prof. Ke Sun (PI), Prof. Anhong Guo (Co-PI), and Prof. Kang G.Shin (Co-PI) have been awarded a Samsung START project to develop a 
    multi-modal lifelong memory augmentation system that can capture, store, and retrieve human experiences in real-time.
  url: https://cse.engin.umich.edu/stories/samsung-start-funds-cse-researchers-wearable-memory-augmentation-system/

- title: "**UltraPoser** has been accepted at **ACM UIST 2025**. Congratulations to the Yadong and Shuning!" 
  date: 2025-07-15
  description: UltraPoser is a multi-modal full-body motion capture system using commodity wearable devices only to integrate ultrasonic sensing 
    with inertial measurements for improved fidelity, broader coverage and increased reliability.
  url: https://uist.acm.org/2025/

- title: "**EveGuard** has been accepted at **IEEE S&P (Oakland) 2025**. Congratulations to the Jung-woo!" 
  date: 2025-05-01
  description: EveGuard is a software-driven defense framework that creates adversarial audio, protecting voice privacy from side channels 
    (including mmWave radars, light sensors, and accelerometers) without compromising human perception.
  url: https://www.computer.org/csdl/proceedings-article/sp/2025/611570a217/26hiTkHYjh6
