- title: "**[MoiréLens](https://ambient-intelligence-lab-umich-eecs.github.io/MoireLens-Page/)** (sensing and visualizing invisible air flow change) is accepted by **SenSys 2026**! Congratulations to [Linzhen](https://linzhenzhu.me/) and [Runqiu](https://runqiuw.github.io/)!"
  date: 2026-03-01
  description: MoiréLens brings Schlieren imaging into real-world environments by converting subtle airflow-induced refractive-index changes into measurable moire phase shifts.
  url: https://ambient-intelligence-lab-umich-eecs.github.io/MoireLens-Page/
  links:
